<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauer Media - Coaching Continuum Slider</title>
    <style>
        :root {
            /* Bauer Brand Palette Custom Properties - FIXED HEX CODES */
            --bauer-purple: #4700A3;
            --brand-peach: #FF7D6A;
            --brand-lemon: #FFF050;
            --brand-mint: #1FD1BD;
            --brand-aqua: #5AF0FF; /* Fixed: Changed letter O to number 0 */
            
            /* High-Contrast text/border mappings from brand guide */
            --dark-purple: #320073;
            --dark-peach: #D05C5D;
            --dark-lemon: #F0A800;
            --dark-mint: #009392;
            --dark-aqua: #349CDC;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .continuum-container {
            width: 100%;
            max-width: 780px;
            background: #ffffff;
            padding: 25px;
            border: 2px solid #f5f5f5;
            border-radius: 16px;
            box-sizing: border-box;
        }

        /* Top Header Labels */
        .top-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .direction-label {
            width: 46%;
        }

        .direction-label.right {
            text-align: right;
        }

        .direction-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--bauer-purple);
            margin: 0 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .direction-desc {
            font-size: 0.95rem;
            color: #444444;
            margin: 0;
        }

        /* Slider Wrapper Container */
        .slider-wrapper {
            position: relative;
            margin: 40px 14px 10px 14px;
            height: 24px;
        }

        /* Consistent Height Vector Gradient Track */
        .svg-track {
            position: absolute;
            top: 6px;
            left: 0;
            width: 100%;
            height: 12px;
            z-index: 1;
            pointer-events: none;
        }

        /* High-Contrast Visual Handle */
        .visual-thumb {
            position: absolute;
            top: 0;
            left: 0%; 
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: var(--bauer-purple);
            border: 3px solid var(--dark-purple);
            box-sizing: border-box;
            z-index: 2;
            pointer-events: none;
            transform: translateX(-12px); 
            transition: left 0.15s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        /* Transparent Interactive Slider overlay */
        .continuum-slider {
            -webkit-appearance: none;
            appearance: none;
            position: absolute;
            top: -3px;
            left: -14px;
            width: calc(100% + 28px);
            height: 30px;
            background: transparent;
            margin: 0;
            z-index: 3;
            cursor: pointer;
            outline: none;
        }

        /* Invisible native handles */
        .continuum-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 34px;
            height: 34px;
            background: transparent;
            cursor: pointer;
        }

        .continuum-slider::-moz-range-thumb {
            width: 34px;
            height: 34px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .continuum-slider::-webkit-slider-runnable-track { background: transparent; }
        .continuum-slider::-moz-range-track { background: transparent; }

        /* Interactive Dynamic Information Panel Box */
        .details-box {
            margin-top: 40px;
            text-align: center;
            min-height: 95px;
            padding: 20px;
            border-radius: 12px;
            background-color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 5px solid var(--bauer-purple);
            box-sizing: border-box;
        }

        .current-stage {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 0 8px 0;
        }

        .current-phrase {
            font-size: 1.15rem;
            font-style: italic;
            color: #333333;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="continuum-container">
    <div class="top-labels">
        <div class="direction-label">
            <h3 class="direction-title">Directive</h3>
            <p class="direction-desc">I bring the answer &bull; <strong>push</strong></p>
        </div>
        <div class="direction-label right">
            <h3 class="direction-title">Non-directive</h3>
            <p class="direction-desc">They find the answer &bull; <strong>pull</strong></p>
        </div>
    </div>

    <div class="slider-wrapper" id="sliderWrapper">
        
        <svg class="svg-track" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 100 12">
            <defs>
                <linearGradient id="bauerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#4700A3" />
                    <stop offset="25%" stop-color="#FF7D6A" />
                    <stop offset="50%" stop-color="#FFF050" />
                    <stop offset="75%" stop-color="#1FD1BD" />
                    <stop offset="100%" stop-color="#5AF0FF" />
                </linearGradient>
            </defs>
            <rect width="100" height="12" rx="6" fill="url(#bauerGradient)" />
        </svg>

        <div class="visual-thumb" id="visualThumb"></div>

        <input type="range" min="0" max="4" value="0" step="1" class="continuum-slider" id="coachingSlider">
    </div>

    <div class="details-box" id="detailsBox">
        <h4 class="current-stage" id="stageTitle">Loading...</h4>
        <p class="current-phrase" id="stagePhrase"></p>
    </div>
</div>

<script>
    // Data structures storing both core fill color and contrast border colors
    const data = [
        { stage: "Telling", phrase: '"Do this"', color: "var(--bauer-purple)", borderHex: "var(--dark-purple)" },
        { stage: "Advising", phrase: '"Have you tried..."', color: "var(--brand-peach)", borderHex: "var(--dark-peach)" },
        { stage: "Suggesting", phrase: '"One option is..."', color: "var(--brand-lemon)", borderHex: "var(--dark-lemon)" },
        { stage: "Asking", phrase: '"What do you see?"', color: "var(--brand-mint)", borderHex: "var(--dark-mint)" },
        { stage: "Listening", phrase: '"Tell me more..."', color: "var(--brand-aqua)", borderHex: "var(--dark-aqua)" }
    ];

    const slider = document.getElementById('coachingSlider');
    const visualThumb = document.getElementById('visualThumb');
    const stageTitle = document.getElementById('stageTitle');
    const stagePhrase = document.getElementById('stagePhrase');
    const detailsBox = document.getElementById('detailsBox');

    function updateSlider(value) {
        const index = parseInt(value, 10);
        const currentData = data[index];

        // 1. Update text panel options
        stageTitle.textContent = currentData.stage;
        stageTitle.style.color = currentData.borderHex;
        stagePhrase.textContent = currentData.phrase;
        detailsBox.style.borderTopColor = currentData.borderHex;

        // 2. Apply vibrant fill and high-contrast border limits
        visualThumb.style.backgroundColor = currentData.color;
        visualThumb.style.borderColor = currentData.borderHex;

        // 3. Move via clean percentage coordinates
        const percentage = (index / 4) * 100;
        visualThumb.style.left = `${percentage}%`;
        
        // 4. Match drop shadow aura color
        visualThumb.style.boxShadow = `0 2px 10px ${currentData.borderHex}55`;
    }

    slider.addEventListener('input', (e) => {
        updateSlider(e.target.value);
    });

    // Initialize layout settings starting at index position 0
    updateSlider(0);
</script>

</body>
</html>
